<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supplier Dashboard | APD Global Trade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter,sans-serif;background:#f5f7fb}
header{
  background:#071427;color:#c9a44a;
  padding:16px 30px;
  display:flex;justify-content:space-between;align-items:center
}
header a{color:#e5e7eb;margin-left:20px;text-decoration:none}
.card{
  max-width:600px;margin:80px auto;
  background:#fff;padding:30px;border-radius:16px;
  box-shadow:0 2px 10px rgba(0,0,0,.08)
}
</style>
</head>

<body>

<header>
  <div>APD Global Trade</div>
  <div>
    <a href="/supplier-rfqs.html">View RFQs</a>
    <a href="/membership.html">Upgrade</a>
    <a href="#" id="logout">Logout</a>
  </div>
</header>

<div class="card">
  <h2 id="welcome">Welcome</h2>
  <p>Status: <b id="status">checking…</b></p>
  <p>Plan: <b id="plan">checking…</b></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { 
  getFirestore, collection, query, where, getDocs, getDoc, doc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyABA-KRY6bY7K2QZwLhQ2piHjQVLLceiGs",
  authDomain: "apd-globaltrade-prod.firebaseapp.com",
  projectId: "apd-globaltrade-prod",
  storageBucket: "apd-globaltrade-prod.firebasestorage.app",
  messagingSenderId: "226407312435",
  appId: "1:226407312435:web:f8a54b1132af3899170746"
});

const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "/supplier-login.html";
    return;
  }

  if (user.email === "admin@apdglobaltrade.com") {
    location.href = "/admin.html";
    return;
  }

  // Show Sync ID IMMEDIATELY for debugging
  const syncInfo = document.createElement("p");
  syncInfo.style.fontSize = "11px";
  syncInfo.style.color = "#64748b";
  syncInfo.style.marginTop = "20px";
  syncInfo.innerHTML = `Your Sync ID: <b style="color:#071427">${user.uid}</b><br><span style="font-size:9px">Provide this to Admin if your status is incorrect.</span>`;
  document.querySelector(".card").appendChild(syncInfo);

  document.getElementById("welcome").innerText = "Welcome, Supplier";
  console.log("Logged in as UID:", user.uid);

  try {
    const snap = await getDoc(doc(db, "suppliers", user.uid));
    
    if (!snap.exists()) {
      document.getElementById("status").innerText = "pending (Profile not found)";
      document.getElementById("plan").innerText = "free";
      return;
    }

    const s = snap.data();
    document.getElementById("welcome").innerText =
      "Welcome, " + (s.companyName || "Supplier");
    
    // Status color
    const statusEl = document.getElementById("status");
    statusEl.innerText = s.status || "pending";
    statusEl.style.color = (s.status === "approved") ? "#16a34a" : "#dc2626";

    // Plan with Credits display
    let planText = s.plan || "free";
    const planMap = {
      '7_day_pass': '7-Day Power Pass',
      'trial_3m': '3-Month Premium Trial',
      'pro_6m': '6-Month Elite Professional',
      'elite_12m': '12-Month Institutional Elite',
      'free': 'Free',
      'basic': 'Basic',
      'premium': '3-Mo Premium Trial'
    };

    if (s.plan === "7_day_pass") {
      const remaining = 7 - (s.unlocksUsed || 0);
      const pName = planMap[s.plan] || s.plan;
      planText = `${pName} (${remaining} credits left)`;
    } else if (planMap[s.plan]) {
      planText = planMap[s.plan];
    }
    
    document.getElementById("plan").innerText = planText;

  } catch (e) {
    console.error("Dashboard Error:", e);
    document.getElementById("status").innerText = "Error: " + (e.message || "Unknown error");
    document.getElementById("status").style.color = "red";
  }
});

document.getElementById("logout").onclick = async ()=>{
  await signOut(auth);
  location.href="/supplier-login.html";
};
</script>

</body>
</html>
