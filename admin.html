<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel | APD Global Trade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f7fb}
header{
  background:#020617;color:#fff;
  padding:16px 40px;
  display:flex;justify-content:space-between;align-items:center
}
.container{
  max-width:1200px;margin:40px auto;
  background:#fff;border-radius:12px;overflow:hidden
}
table{width:100%;border-collapse:collapse}
th,td{padding:14px;border-bottom:1px solid #e5e7eb;text-align:left}
th{background:#020617;color:#fff}
button{
  padding:6px 10px;margin:2px;
  border:none;border-radius:4px;
  cursor:pointer;font-size:12px;color:#fff
}
.approve{background:#16a34a}
.pass{background:#c9a44a; color:#000; font-weight:700}
.ban{background:#dc2626}
.unban{background:#2563eb}
.free{background:#64748b}
.gold{background:#d97706}
.platinum{background:#4f46e5}
.premium{background:#0f172a; border:1px solid #c9a44a; color:#c9a44a}
footer{
  background:#020617;color:#9ca3af;
  text-align:center;padding:40px 20px;font-size:14px
}
</style>
</head>

<body>

<header>
  <h2>Admin – Supplier Management</h2>
  <button id="logoutBtn">Logout</button>
</header>

<div class="container">
<table>
<thead>
<tr>
<th>Company</th>
<th>Email</th>
<th>ID (UID)</th>
<th>Status</th>
<th>Plan</th>
<th>Unlocks</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="7">Loading suppliers…</td></tr>
</tbody>
</table>
</div>

<footer>
  <p style="color:#c9a44a;font-weight:600">APD Global Trade</p>
  <p>Elite B2B Trade Facilitation Platform</p>
  <p>
    <a href="/terms.html" style="color:#c9a44a">Terms</a> |
    <a href="/privacy.html" style="color:#c9a44a">Privacy</a> |
    <a href="/disclaimer.html" style="color:#c9a44a">Disclaimer</a>
  </p>
  <p>
    📧 info@apdglobaltradehub.com<br>
    💬 WhatsApp: +91 92664 18868
  </p>
</footer>

<a href="https://wa.me/919266418868" target="_blank"
style="position:fixed;bottom:20px;right:20px;width:56px;height:56px;
background:#25D366;color:#fff;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:28px;box-shadow:0 10px 25px rgba(0,0,0,.25);
z-index:9999;text-decoration:none;">💬</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const ADMIN_EMAIL = "admin@apdglobaltrade.com";

// Firebase init
const app = initializeApp({
  apiKey: "AIzaSyABA-KRY6bY7K2QZwLhQ2piHjQVLLceiGs",
  authDomain: "apd-globaltrade-prod.firebaseapp.com",
  projectId: "apd-globaltrade-prod",
  storageBucket: "apd-globaltrade-prod.firebasestorage.app",
  messagingSenderId: "226407312435",
  appId: "1:226407312435:web:f8a54b1132af3899170746"
});

const auth = getAuth(app);
const db = getFirestore(app);
const tbody = document.getElementById("tbody");

// Auth guard
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "/supplier-login.html";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    alert("Admins only");
    location.href = "/supplier-dashboard.html";
    return;
  }

  loadSuppliers();
});

// Load suppliers
async function loadSuppliers() {
  tbody.innerHTML = "<tr><td colspan='7'>Loading suppliers…</td></tr>";

  try {
    const snap = await getDocs(collection(db, "suppliers"));

    if (snap.empty) {
      tbody.innerHTML = "<tr><td colspan='7'>No suppliers found</td></tr>";
      return;
    }

    tbody.innerHTML = "";

    snap.forEach(d => {
      const s = d.data();
      const planMap = {
        '7_day_pass': '7-Day Power Pass',
        'trial_3m': '3-Mo Premium Trial',
        'pro_6m': '6-Mo Elite Professional',
        'elite_12m': '12-Mo Institutional Elite',
        'free': 'Free',
        'basic': 'Basic',
        'premium': '3-Mo Premium Trial',
        'platinum': '6-Mo Elite Professional',
        'gold': '3-Mo Premium Trial'
      };
      const planName = planMap[s.plan] || s.plan || "basic";
      const unlockTotal = (s.plan === '7_day_pass') ? '7' : '∞';
      
      const isLegacy = d.id.length < 20; // Minimal heuristic for manual IDs
      const warning = isLegacy ? '<span title="Manual/Legacy ID. May not sync with user login." style="cursor:help;">⚠️</span>' : '';

      tbody.innerHTML += `
        <tr>
          <td>${s.companyName || "-"}</td>
          <td>${s.email || "-"}</td>
          <td style="font-size:10px; font-family:monospace; color:#64748b;">${warning} ${d.id}</td>
          <td><b>${s.status || "pending"}</b></td>
          <td style="font-size:12px;">${planName}</td>
          <td><span style="color:#c9a44a; font-weight:800;">${s.unlocksUsed || 0}</span> / ${unlockTotal}</td>
          <td>
            <button class="approve" onclick="upd('${d.id}',{status:'approved'})">Approve</button>
            <button class="pass" onclick="upd('${d.id}',{plan:'7_day_pass', status:'approved', unlocksUsed:0, unlockedLeads:[]})">Assign 7-Day Pass</button>
            <button class="gold" onclick="upd('${d.id}',{plan:'trial_3m', status:'approved'})">Set 3-Mo Trial</button>
            <button class="platinum" onclick="upd('${d.id}',{plan:'pro_6m', status:'approved'})">Set 6-Mo Elite</button>
            <button class="premium" onclick="upd('${d.id}',{plan:'elite_12m', status:'approved'})">Set 12-Mo Elite</button>
            <button class="free" onclick="upd('${d.id}',{plan:'free'})">Free</button>
            <button class="ban" onclick="upd('${d.id}',{status:'banned'})">Ban</button>
            ${isLegacy ? `<button class="ban" style="background:#000" onclick="del('${d.id}')">Delete</button>` : ''}
          </td>
        </tr>`;
    });

  } catch (err) {
    console.error("Error loading suppliers:", err);
    tbody.innerHTML = "<tr><td colspan='5'>Error loading suppliers</td></tr>";
  }
}

// Update supplier
window.upd = async (id, data) => {
  await updateDoc(doc(db, "suppliers", id), data);
  loadSuppliers();
};

window.del = async (id) => {
  if (confirm("Are you sure you want to delete this LEGACY record? This will NOT delete the user account.")) {
    await deleteDoc(doc(db, "suppliers", id));
    loadSuppliers();
  }
};

// Logout
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  location.href = "/supplier-login.html";
};
</script>

</body>
</html>
