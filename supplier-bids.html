<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Bids | APD Global Trade</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Inter,sans-serif;background:#f5f7fb}
header{
  background:#071427;color:#c9a44a;
  padding:16px 20px;
  display:flex;justify-content:space-between;align-items:center
}
a{color:#e5e7eb;text-decoration:none;margin-left:16px}
.container{max-width:900px;margin:30px auto;padding:0 16px}
.card{
  background:#fff;border-radius:14px;
  padding:20px;margin-bottom:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  border-left: 4px solid #d4af37;
}
.status-pending { color: #f59e0b; font-weight: bold; }
.status-accepted { color: #16a34a; font-weight: bold; }
.status-rejected { color: #dc2626; font-weight: bold; }
</style>
</head>

<body>

<header>
  <div>APD Global Trade</div>
  <div>
    <a href="/supplier-dashboard.html">Dashboard</a>
    <a href="/supplier-rfqs.html">View RFQs</a>
    <a href="#" id="logout">Logout</a>
  </div>
</header>

<div class="container">
  <h2>My Submitted Bids</h2>
  <p style="color:#666; font-size:14px; margin-top:-10px; margin-bottom:20px;">Track the status of all your quotes sent to global buyers.</p>
  <div id="bidsList">Loading your bids…</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { 
  getFirestore, collection, query, where, getDocs 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyABA-KRY6bY7K2QZwLhQ2piHjQVLLceiGs",
  authDomain: "apd-globaltrade-prod.firebaseapp.com",
  projectId: "apd-globaltrade-prod",
  storageBucket: "apd-globaltrade-prod.firebasestorage.app",
  messagingSenderId: "226407312435",
  appId: "1:226407312435:web:f8a54b1132af3899170746"
});

const auth = getAuth(app);
const db = getFirestore(app);
const bidsList = document.getElementById("bidsList");

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "/supplier-login.html";
    return;
  }

  try {
    const q = query(collection(db, "bids"), where("supplierId", "==", user.uid));
    const snap = await getDocs(q);
    
    if (snap.empty) {
      bidsList.innerHTML = "<div style='padding:40px; text-align:center; background:#fff; border-radius:12px;'><h3 style='color:#666;'>No bids submitted yet.</h3><a href='/supplier-rfqs.html' style='background:#071427; color:#c9a44a; padding:10px 20px; border-radius:6px; display:inline-block; margin-top:10px;'>Find RFQs to Bid On</a></div>";
      return;
    }

    let bids = snap.docs.map(d => ({id: d.id, ...d.data()}));
    bids.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

    bidsList.innerHTML = "";

    bids.forEach(bid => {
      const dateText = bid.createdAt ? new Date(bid.createdAt.seconds * 1000).toLocaleDateString() : "Recently";
      const statusClass = "status-" + (bid.status || "pending").toLowerCase();
      
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:start;">
           <h3 style="font-size:18px; margin:0;">Price Quoted: $${bid.price} <span style="font-size:14px; color:#666;">(${bid.incoterms})</span></h3>
           <span style="font-size:11px; color:#94a3b8; background:#f1f5f9; padding:4px 8px; border-radius:4px;">${dateText}</span>
        </div>
        <div style="margin:12px 0;">
          <p style="margin:4px 0; font-size:14px;"><b>RFQ Reference:</b> ${bid.rfqId}</p>
          <p style="margin:4px 0; font-size:14px;"><b>Delivery Timeline:</b> ${bid.deliveryDays} Days</p>
          ${bid.notes ? `<p style="margin:4px 0; font-size:14px; background:#f9fafb; padding:8px; border-radius:4px;"><b>Note:</b> ${bid.notes}</p>` : ''}
        </div>
        <div style="margin-top:15px; padding-top:15px; border-top:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
          <span style="font-size:14px;">Status: <span class="${statusClass}">${(bid.status || "Pending").toUpperCase()}</span></span>
          ${bid.status === "accepted" ? '<span style="background:#16a34a; color:#fff; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:bold;">Winner!</span>' : ''}
        </div>
      `;
      bidsList.appendChild(card);
    });

  } catch (e) {
    console.error(e);
    bidsList.innerHTML = "<p>Error loading bids.</p>";
  }
});

document.getElementById("logout").onclick = async () => {
  await signOut(auth);
  location.href = "/supplier-login.html";
};
</script>

</body>
</html>
