cowDungBtn.onclick = () => {
  rfqs = [];
  
  for (let i = 0; i < 200; i++) {
    const baseBuyer = COW_DUNG_BUYERS[Math.floor(Math.random() * COW_DUNG_BUYERS.length)];
    const multiplier = 1 + (Math.random() * 0.4);
    const newSize = Math.floor(baseBuyer.size * multiplier);
    const baseQtyNum = parseInt(baseBuyer.qty.replace(/,/g, ''));
    const newQty = Math.floor(baseQtyNum * multiplier).toLocaleString() + " MT";

    rfqs.push({
      product: baseBuyer.product,
      quantity: newQty,
      deliveryPort: baseBuyer.port,
      dealSizeUSD: newSize,
      status: "open",
      source: "admin-seed",
      buyerName: baseBuyer.name,
      email: baseBuyer.email,
      contact: baseBuyer.phone
    });
  }

  output.value = JSON.stringify(rfqs, null, 2);
};

/* ✅ GENERATE CUSTOM COMMODITY RFQS */
customGenerateBtn.onclick = () => {
  rfqs = [];
  const selectedProduct = customCommodity.value;
  
  for (let i = 0; i < 100; i++) {
    const fakeName = fakeNames[Math.floor(Math.random() * fakeNames.length)] + " " + Math.floor(Math.random()*1000);
    const generatedContact = generateContactInfo(fakeName);
    const qty = Math.floor(Math.random() * 900 + 100);
    
    rfqs.push({
      product: selectedProduct,
      quantity: `${qty} MT`,
      deliveryPort: COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)],
      dealSizeUSD: Math.floor(Math.random() * 4000000 + 500000),
      status: "open",
      source: "admin-seed",
      buyerName: fakeName,
      email: generatedContact.email,
      contact: generatedContact.phone
    });
  }

  output.value = JSON.stringify(rfqs, null, 2);
};

/* ✅ UPLOAD ALL CURRENT RFQS IN THE TEXTAREA TO FIRESTORE */
uploadBtn.onclick = async () => {
  if (!rfqs.length) {
    alert("Generate RFQs first");
    return;
  }

  uploadBtn.disabled = true;
  uploadBtn.innerText = "Uploading...";

  try {
    for (const r of rfqs) {
      await addDoc(collection(db, "rfqs"), {
        ...r,
        createdAt: serverTimestamp()
      });
    }

    alert("✅ RFQs uploaded successfully!");
    output.value = "";
    rfqs = [];
  } catch (err) {
    console.error(err);
    alert("❌ Upload failed. Check console.");
  }

  uploadBtn.disabled = false;
  uploadBtn.innerText = "Upload RFQs";
};
